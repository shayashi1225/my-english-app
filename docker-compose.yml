services:
  db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: english_app
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d english_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Containerfile
    env_file:
      - ./secrets/.env
    environment:
      DATABASE_URL: postgresql://appuser:apppassword@db:5432/english_app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Containerfile
    ports:
      - "3000:8080"
    depends_on:
      - backend

volumes:
  db_data:
